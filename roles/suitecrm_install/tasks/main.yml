---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  apt:
    name:
      - apache2
      - mysql-server
      - php
      - php-mysql
      - php-curl
      - php-gd
      - php-mbstring
      - php-xml
      - php-zip
      - php-imap
      - php-intl
      - php-bcmath
      - php-soap
      - php-ldap
      - libapache2-mod-php
      - unzip
      - wget
      - curl
      - python3-pip
      - python3-pymysql
    state: present

- name: Enable Apache modules
  apache2_module:
    name: "{{ item }}"
    state: present
  loop:
    - rewrite
    - headers
  notify: Restart Apache

- name: Start and enable services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - apache2
    - mysql

- name: Create SuiteCRM database
  mysql_db:
    name: "{{ db_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create SuiteCRM DB user
  mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: localhost
    login_unix_socket: /var/run/mysqld/mysqld.sock
    state: present

- name: Check if SuiteCRM already installed
  stat:
    path: "{{ suitecrm_web_root }}/index.php"
  register: suitecrm_installed

- name: Create SuiteCRM web root directory
  file:
    path: "{{ suitecrm_web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  when: not suitecrm_installed.stat.exists

- name: Download SuiteCRM
  get_url:
    url: "https://github.com/salesagility/SuiteCRM/releases/download/v7.14.4/SuiteCRM-7.14.4.zip"
    dest: /tmp/suitecrm.zip
    timeout: 300
  when: not suitecrm_installed.stat.exists

- name: Extract SuiteCRM
  unarchive:
    src: /tmp/suitecrm.zip
    dest: "{{ suitecrm_web_root }}"
    remote_src: true
    extra_opts: ["--strip-components=1"]
    owner: www-data
    group: www-data
  when: not suitecrm_installed.stat.exists

- name: Set SuiteCRM file permissions
  file:
    path: "{{ suitecrm_web_root }}"
    owner: www-data
    group: www-data
    recurse: true
    mode: "0755"
  when: not suitecrm_installed.stat.exists

- name: Deploy Apache VirtualHost config
  template:
    src: suitecrm_vhost.conf.j2
    dest: /etc/apache2/sites-available/suitecrm.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Apache

- name: Enable SuiteCRM site
  command: a2ensite suitecrm.conf
  notify: Restart Apache

- name: Fix SuiteCRM file permissions
  file:
    path: "{{ suitecrm_web_root }}"
    owner: www-data
    group: www-data
    recurse: true
