---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  apt:
    name:
      - apache2
      - mysql-server
      - libapache2-mod-php8.1
      - php8.1
      - php8.1-mysql
      - php8.1-curl
      - php8.1-gd
      - php8.1-mbstring
      - php8.1-xml
      - php8.1-zip
      - php8.1-imap
      - php8.1-intl
      - php8.1-bcmath
      - php8.1-soap
      - php8.1-ldap
      - unzip
      - wget
      - curl
      - python3-pymysql
    state: present

- name: Enable Apache modules
  apache2_module:
    name: "{{ item }}"
    state: present
  loop:
    - rewrite
    - headers
  notify: Restart Apache

- name: Start and enable services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - apache2
    - mysql

- name: Create SuiteCRM database
  mysql_db:
    name: "{{ db_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create SuiteCRM DB user
  mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: localhost
    login_unix_socket: /var/run/mysqld/mysqld.sock
    state: present

- name: Check if SuiteCRM already installed
  stat:
    path: "{{ suitecrm_web_root }}/config.php"
  register: suitecrm_config

- name: Deploy Apache VirtualHost config
  template:
    src: suitecrm_vhost.conf.j2
    dest: /etc/apache2/sites-available/suitecrm.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Apache

- name: Enable SuiteCRM site
  command: a2ensite suitecrm.conf
  notify: Restart Apache

- name: Fix SuiteCRM file permissions
  file:
    path: "{{ suitecrm_web_root }}"
    owner: www-data
    group: www-data
    recurse: true
